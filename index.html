<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصه. عربي
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* لضمان المقاسات */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4e44e7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .footer-links {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>تسجيل الدخول</h2>
    <p style="font-size: 14px; color: #888;">مرحباً بعودتك! ادخل بياناتك للمتابعة</p>
    
    <input type="text" placeholder="رقم الهاتف">
    <input type="password" placeholder="كلمة المرور">
    
    <button>دخول للمنصة</button>
    
    <div class="footer-links">
        ليس لديك حساب؟ <span style="color: #4e44e7;">إنشاء حساب جديد</span>
    </div>
</div>

</body>
</html>
